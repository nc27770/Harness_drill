# Harness Drill — Dispatch (string_01) reverse proxy
# 80 → redirect to 443
# 443 → 127.0.0.1:7860 (Gradio + FastAPI)
# WebSocket upgrade is REQUIRED — Gradio uses WS for live event streaming.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/harness.crt;
    ssl_certificate_key /etc/nginx/ssl/harness.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Generous size + timeouts: video calls take 60–120s, image returns
    # are multi-MB before presigning.
    client_max_body_size 100M;
    proxy_read_timeout   900s;
    proxy_send_timeout   900s;

    location / {
        proxy_pass http://127.0.0.1:7860;
        proxy_http_version 1.1;

        # WebSocket upgrade — required for Gradio's live UI events.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard reverse-proxy headers.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering so streamed responses (Gradio chat-style)
        # arrive as the server emits them.
        proxy_buffering off;
    }
}
